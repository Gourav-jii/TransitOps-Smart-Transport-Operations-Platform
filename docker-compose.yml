version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: transitops-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - transitops-net
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: transitops-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/transitops
      - JWT_SECRET=transitops-secret-key-2026-hackathon
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - transitops-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: transitops-frontend
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - transitops-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  transitops-net:
    driver: bridge
